<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><b>Bài 1</b></p>
    <table border="1" >
        <thead>
            <th colspan="3"><h1><i>My Store</i></h1></th>
        </thead>
        <thead>
          <th>Item photo</th>
          <th>Name</th>
          <th>Price</th>  
        </thead>

        <br>
        <tbody>
            <tr>
                <td><img width="200" src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/da/Cara_cara_orange_cut_in_half.JPG/500px-Cara_cara_orange_cut_in_half.JPG" alt=""></td>
                <td>Oranges</td>
                <td>$1 ea.</td>
            </tr>
            <tr>
                <td><img width="200" src="http://abc.jpg"></td>
                <td>Banana</td>
                <td>$0.75/lb</td>
            </tr>
            <tr>
                <td><img width="200" src="https://thanhnien.mediacdn.vn/Uploaded/minhnguyet/2016_02_04/quakuu_YUMP.jpg?width=500" alt=""></td>
                <td>Pomegranate</td>
                <td>3 for $5/lb</td>
            </tr>
            <tr>
                <td><img width="200" src="http://default.jpg"></td>
                <td>Gummy Bear</td>
                <td>$6 per bag</td>
            </tr>
            <tr>
                <td><img width="200" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/Broccoli_and_cross_section_edit.jpg/500px-Broccoli_and_cross_section_edit.jpg" alt=""></td>
                <td>Broccoli</td>
                <td>$3 a head</td>
            </tr>           
        </tbody>
    </table>

    <br>
    <p><b>Bài 2</b></p>
    <h1>Booking Form</h1>
    <form action="">
        <p><label for="name">Name</label>
        <input type="text"></p>

        <p><label for="email">Email</label>
        <input type="email"></p>

        <p><label for="phone">Phone</label>
        <input type="number"></p>

        <p><label for="date">Date</label>
        <input type="date"></p>

        <p><label for="time">Time</label>
        <input type="time"></p>

        <p><label for="number of guests">Number of Guests</label>
        <input type="number"></p>

        <button>Submit</button>
    </form>

    <br>
    <p><b>Bài 3</b></p>
    <h1>Car Purchase Form</h1>
    
    <form action="">
        <p><label for="name">Name:</label>
        <input type="text"></p>

        <p><label for="email">Email:</label>
        <input type="email"></p>

        <p><label for="phone">Phone:</label>
        <input type="number"></p>

        <p><label for="Choose a Car">Choose a Car:</label>
            <select name="Choose a Car" id="">Choose a Car
                <option value="model 1">Model 1</option>
                <option value="model 2">Model 2</option>
                <option value="model 3">Model 3</option>
        </select></p>

        <p><label for="Choose a Color">Choose a Color:</label>
            <select name="Choose a Color" id="">Choose a Color
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="white">White</option>
        </select></p>

         <p><label for="quaintity">Quaintity:</label>
        <input type="text"></p>

        <p><label for="delivery date">Delivery Date:</label>
        <input type="date" name="" id=""></p>

        <button>Submit</button>

    </form>

</body>
</html>
